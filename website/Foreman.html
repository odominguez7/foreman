<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Foreman — your new quoting hand</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --paper: #f4efe4;
    --paper-2: #ece6d7;
    --ink: #14110d;
    --ink-2: #3a342a;
    --ink-3: #6b6354;
    --rule: #cabfa6;
    --rule-2: #ded4bb;
    --accent: #0a5a8a;      /* blueprint cyan-blue */
    --accent-2: #c2410c;    /* shop-floor orange, used sparingly */
    --ok: #3a6b2f;
    --paper-edge: #e6dfcb;
    --shadow: 0 1px 0 rgba(20,17,13,0.06);
    --body-size: 20px;
    --body-line: 1.55;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
    --serif: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif);
    font-size: var(--body-size);
    line-height: var(--body-line);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background-image:
      linear-gradient(to right, rgba(20,17,13,0.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(20,17,13,0.035) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: -1px -1px;
  }
  a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  a:hover { color: var(--ink); }
  button { font: inherit; }
  ::selection { background: var(--accent); color: var(--paper); }

  .mono { font-family: var(--mono); }
  .serif { font-family: var(--serif); }
  .smallcaps { font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; font-size: 13px; color: var(--ink-3); font-weight: 500; }

  #root { width: 100%; }
</style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Tweakable defaults — persisted by the host
    window.__TWEAKS = /*EDITMODE-BEGIN*/{
      "paperTone": "cream",
      "accent": "blueprint",
      "density": "comfortable",
      "headerCase": "uppercase",
      "showGrid": true
    }/*EDITMODE-END*/;
  </script>

  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/quote-dial.jsx"></script>
  <script type="text/babel" src="src/sections.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
