# Wedge Agentic Edge — Track 5 Blueprint (v2: with learning loop)
# =============================================================================
# Sovereign RFQ quoting agent for SMB US machine shops. vLLM primary, cloud
# Nemotron fallback. Runs entirely on-prem. Persistent shop personality across
# sessions — the agent learns from every correction the shop owner makes.

apiVersion: nemoclaw/v1
kind: Blueprint
metadata:
  name: wedge-agentic-edge
  description: "Sovereign RFQ quoting agent for SMB US machine shops with persistent learning."

inference:
  default_profile: vllm-balanced

  profiles:
    - name: vllm-balanced
      provider: openai-compatible
      endpoint: http://host.openshell.internal:8000/v1
      model: meta-llama/Llama-3.1-8B-Instruct
      wire_api: chat_completions
      temperature: 0.3
      max_tokens: 2048
      guided_json: true

    - name: vllm-conservative
      provider: openai-compatible
      endpoint: http://host.openshell.internal:8000/v1
      model: meta-llama/Llama-3.1-8B-Instruct
      temperature: 0.1
      max_tokens: 2048
      guided_json: true
      system_prompt_append: |
        CONSERVATIVE quoting mode. +15% margin cushion, +3d lead buffer, always
        ask a clarifying question on any tight tolerance, mixed units, or
        unusual finish.

    - name: vllm-aggressive
      provider: openai-compatible
      endpoint: http://host.openshell.internal:8000/v1
      model: meta-llama/Llama-3.1-8B-Instruct
      temperature: 0.4
      max_tokens: 2048
      guided_json: true
      system_prompt_append: |
        AGGRESSIVE quoting mode. Undercut historical base ~8%, tighten leads
        where slack allows, never ask clarifying questions, cite nearest lost
        bid as the competitive benchmark.

    - name: nvidia-cloud
      provider: nvidia
      endpoint: https://integrate.api.nvidia.com/v1
      model: nvidia/nemotron-3-super-120b
      temperature: 0.2
      max_tokens: 4096

network:
  allowed_hosts:
    - host.openshell.internal
    - integrate.api.nvidia.com
  blocked_by_default: true

filesystem:
  read_paths: [/sandbox, /workspace, /tmp, /models]
  write_paths: [/sandbox, /tmp]

memory:
  # Persistent shop personality — survives sandbox restarts via the NemoClaw data volume.
  # Every correction the shop owner makes is appended here, retrieved on every subsequent quote.
  personality_store: /sandbox/.openclaw-data/shop-memory/personality.jsonl

agent:
  name: wedge-agent
  system_prompt: |
    You are the quoting assistant for Acme Precision, a 12-person US metal-fab
    machine shop. Every RFQ you handle must follow this exact loop:

      1. Call shop-extract-drawing with the filename.
      2. Call shop-retrieve-similar-jobs with the extracted material + customer.
      3. Call shop-check-material AND shop-check-schedule (parallel OK).
      4. **ALWAYS call shop-recall-personality** with the customer + material +
         part family BEFORE composing a quote. If the matches array is
         non-empty, you MUST incorporate each feedback into the final quote's
         reasoning, pricing, or lead time, and cite the feedback explicitly.
      5. Call shop-compose-quote with the requested steering mode. When
         recall-personality returned matches, pass the raw JSON as arg 5, AND
         translate the feedback into concrete numeric deltas:
           • "add 8%" / "+8%" / "pays slow — bump margin" → margin_pct=8
           • "give 2 extra days" / "never rush them"     → lead_delta_days=+2
           • "tighten by 10% to keep them"               → margin_pct=-10
         Pass these as args 6 and 7 so the displayed price and lead move in
         sync with the feedback cited in the reasoning. If you cite feedback
         but pass 0 deltas, the quote will LOOK adjusted but the numbers won't
         actually move — don't do that.

    If the user responds to a quote with a correction, preference, or rule
    ("too high", "add X%", "this customer always...", "never quote under $Y"),
    **immediately** call shop-remember-feedback to persist it. Do not wait for
    explicit "remember this" instruction. Corrections are training signals.
    Confirm storage in your reply.

    Never fabricate pricing. If extraction looks uncertain, flag it.

  tools:
    - name: shop-extract-drawing
      script: /sandbox/.openclaw-data/skills/shop-extract-drawing/shop-extract-drawing.sh
    - name: shop-retrieve-similar-jobs
      script: /sandbox/.openclaw-data/skills/shop-retrieve-similar-jobs/shop-retrieve-similar-jobs.sh
    - name: shop-check-material
      script: /sandbox/.openclaw-data/skills/shop-check-material/shop-check-material.sh
    - name: shop-check-schedule
      script: /sandbox/.openclaw-data/skills/shop-check-schedule/shop-check-schedule.sh
    - name: shop-compose-quote
      script: /sandbox/.openclaw-data/skills/shop-compose-quote/shop-compose-quote.sh
    # Learning loop
    - name: shop-remember-feedback
      script: /sandbox/.openclaw-data/skills/shop-remember-feedback/shop-remember-feedback.sh
    - name: shop-recall-personality
      script: /sandbox/.openclaw-data/skills/shop-recall-personality/shop-recall-personality.sh

channels:
  telegram:
    enabled: true
    bot_token_env: TELEGRAM_BOT_TOKEN
